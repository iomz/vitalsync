---
services:
  vitalsync-receiver:
    container_name: vitalsync-receiver
    build:
      context: ./receiver
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8790:8790"
    env_file:
      - ./receiver/.env
    volumes:
      - vitalsync-data:/data
    restart: unless-stopped

volumes:
  vitalsync-data:
