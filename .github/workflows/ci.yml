name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  receiver:
    name: receiver
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install receiver
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e receiver

      - name: Compile receiver
        run: python -m compileall -q receiver/src

      - name: Test receiver
        run: python -m unittest receiver/tests/test_vitalsync_receiver.py

      - name: Prepare compose env file
        run: cp receiver/.env.example receiver/.env

      - name: Validate compose file
        run: docker compose config

  ios-build:
    name: iOS build
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Select Xcode 26
        run: |
          XCODE_APP="$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' -print | sort | tail -n 1)"
          test -n "$XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version

      - name: Build unsigned app
        run: xcodebuild -project Vitalsync.xcodeproj -scheme Vitalsync -destination "generic/platform=iOS" CODE_SIGNING_ALLOWED=NO build
